<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Black Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #0D0D0D;
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}

/* ── HEADER ── */
.app-header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 24px 18px;
  flex-shrink: 0;
}

.app-logo-row {
  display: flex;
  align-items: center;
  gap: 11px;
  margin-bottom: 8px;
}

.app-name {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 8px;
  text-transform: uppercase;
  background: linear-gradient(90deg, #555 0%, #999 15%, #ddd 35%, #fff 50%, #ddd 65%, #999 85%, #555 100%);
  background-size: 300% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 12s linear infinite;
}

@keyframes shimmer {
  0%   { background-position: 200% center; }
  100% { background-position: -200% center; }
}

.app-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.2);
  margin-bottom: 20px;
}

.lang-selector {
  display: flex;
  background: rgba(255,255,255,0.04);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 3px;
  gap: 2px;
}

.lang-btn {
  padding: 5px 16px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.28);
  cursor: pointer;
  transition: all 0.3s;
  border-radius: 20px;
  text-transform: uppercase;
}

.lang-btn.active {
  background: rgba(100,0,0,0.55);
  color: rgba(255,255,255,0.8);
}

/* ── SHELF ── */
.shelf-section {
  flex: 1;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
}

.shelf-label {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.12);
  margin-bottom: 18px;
}

.carousel-wrap {
  width: 100%;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.carousel {
  display: flex;
  gap: 20px;
  padding: 20px 0 28px;
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform;
  cursor: grab;
}

.carousel.dragging {
  transition: none;
  cursor: grabbing;
}

/* ── BOOK CARD ── */
.book-card {
  flex: 0 0 180px;
  height: 256px;
  position: relative;
  transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.45s ease, filter 0.45s ease;
  overflow: visible;
  cursor: pointer;
  transform-origin: bottom center;
  pointer-events: auto !important;
  touch-action: manipulation;
}

.book-card.active {
  transform: scale(1.07) translateY(-6px);
  filter: none;
}

.book-card:not(.active) {
  transform: scale(0.87) translateY(12px);
  filter: brightness(0.45) saturate(0.7);
}

.book-cover {
  width: 100%;
  height: 100%;
  border-radius: 2px 4px 4px 2px;
  position: relative;
  overflow: hidden;
}

/* Spine shadow */
.book-cover::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 12px; height: 100%;
  background: linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 70%, transparent 100%);
  z-index: 10;
  pointer-events: none;
}

/* Right page-edge glint */
.book-cover::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  width: 4px; height: 100%;
  background: linear-gradient(to left, rgba(255,255,255,0.07) 0%, transparent 100%);
  z-index: 10;
  pointer-events: none;
}

.book-card.active .book-cover {
  box-shadow: 0 24px 48px rgba(0,0,0,0.8), 0 0 28px rgba(120,0,0,0.2), 5px 0 14px rgba(0,0,0,0.5);
}

.book-card:not(.active) .book-cover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* ══════════════════════════════════
   BLACK BOOK — leather, silver text, red rule
══════════════════════════════════ */
.cover-bb {
  background-color: #0C0C0C;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(255,255,255,0.013) 3px, rgba(255,255,255,0.013) 4px);
}

.cover-bb .inner-border {
  position: absolute;
  inset: 11px 11px 11px 15px;
  border: 0.5px solid rgba(160,160,160,0.22);
  z-index: 2;
  pointer-events: none;
}

.cover-bb .inner-border::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 0.5px solid rgba(160,160,160,0.1);
}

.cover-bb .book-title-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3;
  gap: 0;
  padding: 0 22px;
}

/* Thin silver ornament lines */
.cover-bb .book-ornament {
  width: 40px;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(160,160,160,0.55), transparent);
  margin: 8px 0;
}

/* Red rule sitting below the title text */
.cover-bb .red-rule {
  width: 70%;
  height: 2px;
  background: linear-gradient(90deg, transparent, #8B0000 20%, #B00000 50%, #8B0000 80%, transparent);
  margin-top: 10px;
  margin-bottom: 4px;
}

.cover-bb .bb-flourish {
  opacity: 0.4;
  margin-bottom: 6px;
}

.cover-bb .book-main-title {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: linear-gradient(175deg, #E8E8E8 0%, #A8A8A8 35%, #F0F0F0 55%, #B8B8B8 75%, #888 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  line-height: 1.25;
}

.cover-bb .book-sub-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 2.5px;
  color: rgba(160,160,160,0.38);
  text-align: center;
}

/* ══════════════════════════════════
   RED BOOK — deep velvet
══════════════════════════════════ */
.cover-rb {
  background-color: #580000;
  background-image:
    radial-gradient(ellipse at 35% 25%, rgba(130,0,0,0.9) 0%, transparent 55%),
    radial-gradient(ellipse at 65% 75%, rgba(80,0,0,1) 0%, transparent 55%),
    repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
}

.cover-rb .inner-border {
  position: absolute;
  inset: 11px 11px 11px 15px;
  border: 0.5px solid rgba(220,180,80,0.38);
  z-index: 2;
  pointer-events: none;
}

.cover-rb .inner-border::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 0.5px solid rgba(220,180,80,0.15);
}

.cover-rb .book-title-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3;
  gap: 4px;
  padding: 0 22px;
}

.cover-rb .book-ornament {
  width: 36px;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(220,180,80,0.7), transparent);
  margin: 6px 0;
}

.cover-rb .book-main-title {
  font-family: 'Cinzel', serif;
  font-size: 21px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(175deg, #FFE8A8 0%, #E8C050 35%, #FFE090 65%, #C9980A 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-align: center;
  line-height: 1.25;
}

.cover-rb .book-sub-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 2.5px;
  color: rgba(220,180,80,0.5);
  text-align: center;
}

/* ══════════════════════════════════
   THE WALL — white & cyan tile
══════════════════════════════════ */
.cover-tw {
  background-color: #F0FAFA;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 26px, #00B4BE 26px, #00B4BE 28px),
    repeating-linear-gradient(90deg, transparent, transparent 26px, #00B4BE 26px, #00B4BE 28px);
}

.cover-tw .book-title-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3;
  padding: 0 16px;
  gap: 0;
}

.cover-tw .tw-title-block {
  background: rgba(0,160,170,0.93);
  padding: 14px 20px 12px;
  border: 1.5px solid rgba(255,255,255,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}

.cover-tw .book-main-title {
  font-family: 'Cinzel', serif;
  font-size: 19px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.2;
  text-transform: uppercase;
}

.cover-tw .book-sub-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.75);
  text-align: center;
}

/* ══════════════════════════════════
   VOCABULARY — night blue
══════════════════════════════════ */
.cover-vc {
  background-color: #0F0F1A;
  background-image:
    radial-gradient(ellipse at 50% 30%, rgba(28,28,80,0.9) 0%, transparent 65%),
    radial-gradient(circle at 75% 70%, rgba(18,18,55,0.7) 0%, transparent 40%);
}

.cover-vc .inner-border {
  position: absolute;
  inset: 11px 11px 11px 15px;
  border: 0.5px solid rgba(130,130,195,0.22);
  z-index: 2;
  pointer-events: none;
}

.cover-vc .inner-border::before {
  content: '';
  position: absolute;
  inset: 5px;
  border: 0.5px solid rgba(130,130,195,0.1);
}

.cover-vc .book-title-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 3;
  gap: 4px;
  padding: 0 20px;
}

.cover-vc .book-ornament {
  width: 28px;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(130,130,200,0.5), transparent);
  margin: 5px 0;
}

.cover-vc .vc-cyrillic {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: 4px;
  color: rgba(130,130,200,0.35);
  margin-bottom: 2px;
}

.cover-vc .book-main-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(170,170,235,0.72);
  text-align: center;
  line-height: 1.5;
}

.cover-vc .book-sub-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(130,130,200,0.38);
  text-align: center;
}

/* ── SHELF BASE ── */
.shelf-base {
  width: 88%;
  height: 6px;
  background: linear-gradient(180deg, #2C2218 0%, #1A140E 100%);
  border-radius: 0 0 3px 3px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.65);
  flex-shrink: 0;
}

.shelf-shadow {
  width: 78%;
  height: 8px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.45) 0%, transparent 70%);
  flex-shrink: 0;
}

/* ── BOOK INFO ── */
.book-info {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 16px;
  flex-shrink: 0;
}

.active-title {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
}

.active-subtitle {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.22);
  margin-top: 5px;
}

.dots {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  transition: all 0.35s;
  cursor: pointer;
}

.dot.active {
  background: #8B1A1A;
  transform: scale(1.5);
}

.tap-hint {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 10px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.1);
  margin-top: 12px;
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo-row">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <rect x="3" y="2" width="17" height="22" rx="1.5" fill="#1A1A1A" stroke="rgba(160,160,160,0.35)" stroke-width="0.5"/>
      <rect x="5" y="4" width="13" height="18" rx="1" fill="none" stroke="rgba(160,160,160,0.15)" stroke-width="0.5"/>
      <rect x="2" y="2" width="3" height="22" rx="1" fill="#070707"/>
      <line x1="7" y1="8" x2="15" y2="8" stroke="rgba(160,160,160,0.38)" stroke-width="0.5"/>
      <line x1="7" y1="11" x2="15" y2="11" stroke="rgba(160,160,160,0.2)" stroke-width="0.5"/>
      <line x1="7" y1="14" x2="12" y2="14" stroke="rgba(160,160,160,0.2)" stroke-width="0.5"/>
    </svg>
    <div class="app-name">Black Book</div>
  </div>
  <div class="app-tagline">intimate language</div>
  <div class="lang-selector">
    <div class="lang-btn active">Russian</div>
    <div class="lang-btn">Spanish</div>
    <div class="lang-btn">Mandarin</div>
  </div>
</div>

<div class="shelf-section">
  <div class="shelf-label">Choose Your Book</div>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel">

      <!-- BLACK BOOK -->
      <div class="book-card" data-index="0" data-book="Black Book" data-desc="romantic &amp; sweet">
        <div class="book-cover cover-bb">
          <div class="inner-border"></div>
          <div class="book-title-wrap">
            <svg class="bb-flourish" width="30" height="22" viewBox="0 0 30 22" fill="none">
              <path d="M15 3 C11 9, 4 9, 2 15 C6 13, 10 15, 15 19 C20 15, 24 13, 28 15 C26 9, 19 9, 15 3Z" fill="rgba(150,150,150,0.2)" stroke="rgba(170,170,170,0.45)" stroke-width="0.5"/>
            </svg>
            <div class="book-main-title">Black<br>Book</div>
            <div class="red-rule"></div>
            <div class="book-ornament"></div>
            <div class="book-sub-title">Vol. I</div>
          </div>
        </div>
      </div>

      <!-- RED BOOK -->
      <div class="book-card" data-index="1" data-book="Red Book" data-desc="passionate &amp; intense">
        <div class="book-cover cover-rb">
          <div class="inner-border"></div>
          <div class="book-title-wrap">
            <svg width="22" height="20" viewBox="0 0 22 20" fill="none" style="opacity:0.6;margin-bottom:4px;">
              <path d="M11 17 C11 17, 2 11, 2 6 C2 3.5, 4 2, 6.5 2 C8.5 2, 10 3.5, 11 5 C12 3.5, 13.5 2, 15.5 2 C18 2, 20 3.5, 20 6 C20 11, 11 17, 11 17Z" fill="rgba(200,60,60,0.45)" stroke="rgba(220,180,80,0.6)" stroke-width="0.5"/>
            </svg>
            <div class="book-main-title">Red<br>Book</div>
            <div class="book-ornament"></div>
            <div class="book-sub-title">Vol. II</div>
          </div>
        </div>
      </div>

      <!-- THE WALL -->
      <div class="book-card" data-index="2" data-book="The Wall" data-desc="raw &amp; explicit">
        <div class="book-cover cover-tw">
          <div class="book-title-wrap">
            <div class="tw-title-block">
              <div class="book-main-title">The<br>Wall</div>
              <div class="book-sub-title">Vol. III</div>
            </div>
          </div>
        </div>
      </div>

      <!-- VOCABULARY -->
      <div class="book-card" data-index="3" data-book="Vocabulary" data-desc="words &amp; phrases">
        <div class="book-cover cover-vc">
          <div class="inner-border"></div>
          <div class="book-title-wrap">
            <div class="vc-cyrillic">Я · Л · С</div>
            <div class="book-ornament"></div>
            <div class="book-main-title">Vocab-<br>ulary</div>
            <div class="book-ornament"></div>
            <div class="book-sub-title">reference</div>

      </div>

    </div>
  </div>

  <div class="shelf-base"></div>
  <div class="shelf-shadow"></div>

  <div class="book-info">
    <div class="active-title" id="activeTitle">Black Book</div>
    <div class="active-subtitle" id="activeSubtitle">romantic &amp; sweet</div>
    <div class="dots" id="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="tap-hint">tap to enter</div>
</div>

<script>
var carousel = document.getElementById('carousel');
var cards = Array.from(carousel.querySelectorAll('.book-card'));
var dotsEl = Array.from(document.getElementById('dots').querySelectorAll('.dot'));
var activeTitle = document.getElementById('activeTitle');
var activeSub = document.getElementById('activeSubtitle');

var CARD_WIDTH = 180;
var GAP = 20;
var STEP = CARD_WIDTH + GAP;
var current = 0;
var translate = 0;

var tapStartX = 0;
var tapStartY = 0;
var tapStartTime = 0;
var dragStartTranslate = 0;
var isDragging = false;
var hasDragged = false;

var URLS = {
  'Black Book': 'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/TOzQVZxsuPIRC9AZJXlq',
  'Red Book':   'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/upsdaNYCKCuAyYHX8Cl6',
  'The Wall':   'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/FRKRAQGZBzoaK6Ecqwyx',
  'Vocabulary': 'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/cnyvzRHVMusKmtt86AIY'
};

function getOffset() {
  return (window.innerWidth / 2) - (CARD_WIDTH / 2);
}

function goTo(index) {
  index = Math.max(0, Math.min(cards.length - 1, index));
  current = index;
  translate = -(index * STEP) + getOffset();
  carousel.style.transform = 'translateX(' + translate + 'px)';
  updateActive();
}

function updateActive() {
  cards.forEach(function(c, i) { c.classList.toggle('active', i === current); });
  dotsEl.forEach(function(d, i) { d.classList.toggle('active', i === current); });
  activeTitle.textContent = cards[current].dataset.book;
  activeSub.innerHTML = cards[current].dataset.desc;
}

function navigateTo(bookName) {
  var url = URLS[bookName];
  if (!url) return;

  /* 1. postMessage — Glide listens for this to handle navigation internally */
  try {
    window.parent.postMessage({ type: 'bb-navigate', url: url }, '*');
  } catch(e) {}

  /* 2. Fallback chain — try every exit route after a short delay */
  setTimeout(function() {
    try {
      if (window.top && window.top !== window) {
        window.top.location.href = url;
        return;
      }
    } catch(e) {}
    try {
      if (window.parent && window.parent !== window) {
        window.parent.location.href = url;
        return;
      }
    } catch(e) {}
    /* Last resort — navigate the iframe itself */
    window.location.href = url;
  }, 100);
}

/* ── TOUCH — primary path on mobile ── */
carousel.addEventListener('touchstart', function(e) {
  var t = e.touches[0];
  tapStartX = t.clientX;
  tapStartY = t.clientY;
  tapStartTime = Date.now();
  dragStartTranslate = translate;
  isDragging = true;
  hasDragged = false;
  carousel.classList.add('dragging');
}, { passive: true });

window.addEventListener('touchmove', function(e) {
  if (!isDragging) return;
  var t = e.touches[0];
  var dx = t.clientX - tapStartX;
  var dy = t.clientY - tapStartY;
  if (Math.abs(dx) > 8 || Math.abs(dy) > 8) hasDragged = true;
  translate = dragStartTranslate + dx;
  carousel.style.transform = 'translateX(' + translate + 'px)';
  if (e.cancelable) e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', function(e) {
  if (!isDragging) return;
  isDragging = false;
  carousel.classList.remove('dragging');

  var ct = e.changedTouches[0];
  var dx = ct.clientX - tapStartX;
  var elapsed = Date.now() - tapStartTime;

  /* Swipe */
  if (hasDragged && Math.abs(dx) > 40) {
    goTo(dx < 0 ? current + 1 : current - 1);
    return;
  }

  /* Tap — short duration, minimal movement */
  if (!hasDragged && elapsed < 400 && Math.abs(dx) < 15) {
    /* Use touchstart coords — finger already lifted by touchend */
    var el = document.elementFromPoint(tapStartX, tapStartY);
    var card = el && el.closest('.book-card');

    if (card) {
      var idx = parseInt(card.dataset.index, 10);
      if (idx === current) {
        navigateTo(card.dataset.book);
      } else {
        goTo(idx);
      }
      return;
    }

    /* Bounding rect fallback — handles taps on child elements
       that aren't .book-card themselves */
    var activeCard = cards[current];
    var rect = activeCard.getBoundingClientRect();
    if (tapStartX >= rect.left && tapStartX <= rect.right &&
        tapStartY >= rect.top  && tapStartY <= rect.bottom) {
      navigateTo(activeCard.dataset.book);
      return;
    }
  }

  goTo(current);
}, { passive: true });

/* ── MOUSE — desktop / Glide editor preview ── */
carousel.addEventListener('mousedown', function(e) {
  tapStartX = e.clientX;
  tapStartY = e.clientY;
  tapStartTime = Date.now();
  dragStartTranslate = translate;
  isDragging = true;
  hasDragged = false;
  carousel.classList.add('dragging');
});

window.addEventListener('mousemove', function(e) {
  if (!isDragging) return;
  var dx = e.clientX - tapStartX;
  if (Math.abs(dx) > 8) hasDragged = true;
  translate = dragStartTranslate + dx;
  carousel.style.transform = 'translateX(' + translate + 'px)';
});

window.addEventListener('mouseup', function(e) {
  if (!isDragging) return;
  isDragging = false;
  carousel.classList.remove('dragging');

  var dx = e.clientX - tapStartX;
  var elapsed = Date.now() - tapStartTime;

  if (hasDragged && Math.abs(dx) > 40) {
    goTo(dx < 0 ? current + 1 : current - 1);
    return;
  }

  if (!hasDragged && elapsed < 400 && Math.abs(dx) < 15) {
    var el = document.elementFromPoint(tapStartX, tapStartY);
    var card = el && el.closest('.book-card');
    if (card) {
      var idx = parseInt(card.dataset.index, 10);
      if (idx === current) { navigateTo(card.dataset.book); }
      else { goTo(idx); }
      return;
    }
    /* Bounding rect fallback */
    var activeCard = cards[current];
    var rect = activeCard.getBoundingClientRect();
    if (tapStartX >= rect.left && tapStartX <= rect.right &&
        tapStartY >= rect.top  && tapStartY <= rect.bottom) {
      navigateTo(activeCard.dataset.book);
    }
  } else {
    goTo(current);
  }
});

/* ── DOTS ── */
dotsEl.forEach(function(d, i) {
  d.addEventListener('click', function() { goTo(i); });
});

window.addEventListener('resize', function() { goTo(current); });
goTo(0);
</script>
</body>
</html>
