<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Black Book Shelf</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
.book-card { pointer-events: auto !important; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.carousel { touch-action: pan-y; }
body { background: #0D0D0D; font-family: Georgia, 'Times New Roman', serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; }
.app-header { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 28px 24px 16px; flex-shrink: 0; }
.app-logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.logo-mark { width: 28px; height: 28px; position: relative; }
.app-name { font-size: 18px; font-weight: bold; letter-spacing: 6px; text-transform: uppercase; background: linear-gradient(90deg, #888 0%, #c8c8c8 30%, #fff 50%, #d0d0d0 70%, #888 100%); background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 10s linear infinite; }
@keyframes shimmer { 0% { background-position: 300% center; } 100% { background-position: -300% center; } }
.app-tagline { font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.25); text-transform: uppercase; margin-bottom: 18px; }
.lang-selector { display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; gap: 0; }
.lang-btn { padding: 6px 14px; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.35); cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 5px; font-family: Georgia, serif; }
.lang-btn.active { background: rgba(139,0,0,0.4); color: rgba(255,255,255,0.85); border-radius: 20px; }
.lang-flag { font-size: 13px; }
.header-divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, rgba(139,0,0,0.4), rgba(192,192,192,0.2), rgba(139,0,0,0.4), transparent); margin-top: 16px; }
.shelf-section { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 0; }
.shelf-label { font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.15); margin-bottom: 16px; flex-shrink: 0; }
.carousel-wrap { width: 100%; overflow: hidden; position: relative; flex-shrink: 0; }
.carousel { display: flex; gap: 20px; padding: 16px 0 24px; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); will-change: transform; cursor: grab; }
.carousel.dragging { transition: none; cursor: grabbing; }
.book-card { flex: 0 0 180px; height: 252px; border-radius: 3px; position: relative; transition: transform 0.4s ease, box-shadow 0.4s ease, filter 0.4s ease; overflow: hidden; cursor: pointer; transform-origin: bottom center; }
.book-card.active { transform: scale(1.07) translateY(-5px); filter: none; box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(139,0,0,0.2); }
.book-card:not(.active) { transform: scale(0.88) translateY(10px); filter: brightness(0.55); }
.book-card::before { content: ''; position: absolute; left: 0; top: 0; width: 7px; height: 100%; background: rgba(0,0,0,0.45); z-index: 2; }
.book-card::after { content: ''; position: absolute; bottom: -16px; left: 10%; right: 10%; height: 16px; background: rgba(0,0,0,0.35); filter: blur(8px); border-radius: 50%; }
.book-cover { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 3px; }
.cover-bb { background: #0A0A0A; }
.cover-rb { background: #7A0000; }
.cover-tw { background: #00B4BE; }
.cover-vc { background: #1A1A2E; }
.cover-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 14px; border-radius: 3px; position: relative; }
.cover-bb .cover-placeholder { border: 1px solid rgba(192,192,192,0.15); border-left: none; }
.cover-bb .book-title { background: linear-gradient(180deg, #e8e8e8, #fff, #c0c0c0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.cover-bb .book-sub { color: rgba(192,192,192,0.45); }
.cover-bb .book-divider { background: #8B0000; }
.cover-rb .cover-placeholder { border: 1px solid rgba(201,150,10,0.25); border-left: none; }
.cover-rb .book-title { background: linear-gradient(180deg, #C9960A, #FFD700, #9A7200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.cover-rb .book-sub { color: rgba(201,150,10,0.5); }
.cover-rb .book-divider { background: #C9960A; }
.cover-tw .cover-placeholder { border: 1px solid rgba(0,70,80,0.5); border-left: none; }
.cover-tw .book-title { color: #F0EDE8; }
.cover-tw .book-sub { color: rgba(240,237,232,0.5); }
.cover-tw .book-divider { background: #1C1C1C; }
.cover-vc .cover-placeholder { border: 1px solid rgba(83,52,131,0.35); border-left: none; }
.cover-vc .book-title { color: rgba(200,180,255,0.85); }
.cover-vc .book-sub { color: rgba(200,180,255,0.4); }
.cover-vc .book-divider { background: #533483; }
.book-title { font-size: 18px; font-weight: bold; text-align: center; letter-spacing: 2px; line-height: 1.2; margin-bottom: 10px; }
.book-divider { width: 32px; height: 1px; margin: 0 auto 10px; opacity: 0.6; }
.book-sub { font-size: 8px; text-align: center; letter-spacing: 2.5px; text-transform: uppercase; }
.bb-satin { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 56px; background: linear-gradient(90deg, #3A0000, #8B0000, #CC1A1A, #8B0000, #3A0000); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 2px; }
.bb-satin .book-title { margin-bottom: 0; font-size: 16px; letter-spacing: 4px; background: linear-gradient(90deg, #888, #fff, #888); background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: shimmer 10s linear infinite; }
.shelf-base { width: 100%; height: 3px; background: linear-gradient(90deg, transparent, rgba(139,0,0,0.5), rgba(192,192,192,0.15), rgba(139,0,0,0.5), transparent); flex-shrink: 0; }
.shelf-shadow { width: 100%; height: 8px; background: linear-gradient(180deg, rgba(0,0,0,0.5), transparent); flex-shrink: 0; }
.book-info { display: flex; flex-direction: column; align-items: center; margin-top: 14px; flex-shrink: 0; }
.active-title { font-size: 12px; letter-spacing: 5px; color: rgba(255,255,255,0.65); text-transform: uppercase; min-height: 18px; }
.active-subtitle { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.25); text-transform: uppercase; min-height: 14px; margin-top: 4px; }
.dots { display: flex; gap: 7px; margin-top: 12px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.18); transition: all 0.3s; cursor: pointer; }
.dot.active { background: #8B0000; transform: scale(1.4); }
.tap-hint { margin-top: 10px; font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.1); flex-shrink: 0; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="app-header">
  <div class="app-logo-row">
    <svg class="logo-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 6 C14 6 8 5 4 7 L4 22 C8 20 14 21 14 21 C14 21 20 20 24 22 L24 7 C20 5 14 6 14 6Z" fill="none" stroke="rgba(192,192,192,0.5)" stroke-width="1"/>
      <line x1="14" y1="6" x2="14" y2="21" stroke="rgba(192,192,192,0.4)" stroke-width="1"/>
      <line x1="7" y1="9" x2="12" y2="8.5" stroke="rgba(139,0,0,0.6)" stroke-width="0.75"/>
      <line x1="7" y1="12" x2="12" y2="11.5" stroke="rgba(139,0,0,0.4)" stroke-width="0.75"/>
      <line x1="16" y1="8.5" x2="21" y2="9" stroke="rgba(139,0,0,0.6)" stroke-width="0.75"/>
      <line x1="16" y1="11.5" x2="21" y2="12" stroke="rgba(139,0,0,0.4)" stroke-width="0.75"/>
    </svg>
    <div class="app-name">Black Book</div>
  </div>
  <div class="app-tagline">Intimate Language Learning</div>
  <div class="lang-selector" id="langSelector">
    <div class="lang-btn active" data-lang="ru-en"><span class="lang-flag">🇷🇺</span> Russian</div>
    <div class="lang-btn" data-lang="es-en" style="opacity:0.4; cursor:default;"><span class="lang-flag">🇪🇸</span> Spanish</div>
    <div class="lang-btn" data-lang="fr-en" style="opacity:0.4; cursor:default;"><span class="lang-flag">🇫🇷</span> French</div>
  </div>
  <div class="header-divider"></div>
</div>
<div class="shelf-section">
  <div class="shelf-label">Choose Your Book</div>
  <div class="carousel-wrap">
    <div class="carousel" id="carousel">
      <div class="book-card cover-bb active" data-book="Black Book" data-desc="Romantic &amp; Sweet" data-index="0">
        <div class="cover-placeholder">
          <div class="bb-satin"><div class="book-title">BLACK<br>BOOK</div></div>
          <div class="book-sub" style="position:absolute;bottom:14px;left:0;right:0;color:rgba(192,192,192,0.35);letter-spacing:3px;">Romantic &amp; Sweet</div>
        </div>
      </div>
      <div class="book-card cover-rb" data-book="Red Book" data-desc="Passionate &amp; Intense" data-index="1">
        <div class="cover-placeholder">
          <div class="book-title">RED<br>BOOK</div>
          <div class="book-divider"></div>
          <div class="book-sub">Passionate &amp; Intense</div>
        </div>
      </div>
      <div class="book-card cover-tw" data-book="The Wall" data-desc="Explicit &amp; Raw" data-index="2">
        <div class="cover-placeholder">
          <div class="book-title">THE<br>WALL</div>
          <div class="book-divider"></div>
          <div class="book-sub">Explicit &amp; Raw</div>
        </div>
      </div>
      <div class="book-card cover-vc" data-book="Vocabulary" data-desc="Scenarios &amp; Context" data-index="3">
        <div class="cover-placeholder">
          <div class="book-title">VOCAB<br>ULARY</div>
          <div class="book-divider"></div>
          <div class="book-sub">Scenarios &amp; Context</div>
        </div>
      </div>
    </div>
  </div>
  <div class="shelf-base"></div>
  <div class="shelf-shadow"></div>
  <div class="book-info">
    <div class="active-title" id="activeTitle">Black Book</div>
    <div class="active-subtitle" id="activeSubtitle">Romantic &amp; Sweet</div>
    <div class="dots" id="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="tap-hint">Tap to enter</div>
</div>
<script>
var carousel = document.getElementById('carousel');
var cards = Array.from(carousel.querySelectorAll('.book-card'));
var dots = Array.from(document.getElementById('dots').querySelectorAll('.dot'));
var activeTitle = document.getElementById('activeTitle');
var activeSub = document.getElementById('activeSubtitle');
var CARD_WIDTH = 180;
var GAP = 20;
var STEP = CARD_WIDTH + GAP;
var current = 0;
var startX = 0;
var startTranslate = 0;
var dragging = false;
var didDrag = false;
var translate = 0;

function getOffset() { return (window.innerWidth / 2) - (CARD_WIDTH / 2); }

function goTo(index, animate) {
  index = Math.max(0, Math.min(cards.length - 1, index));
  current = index;
  translate = -(index * STEP) + getOffset();
  carousel.classList.remove('dragging');
  carousel.style.transform = 'translateX(' + translate + 'px)';
  updateActive();
}

function updateActive() {
  cards.forEach(function(c, i) { c.classList.toggle('active', i === current); });
  dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
  activeTitle.textContent = cards[current].dataset.book;
  activeSub.innerHTML = cards[current].dataset.desc;
}

carousel.addEventListener('mousedown', onStart);
carousel.addEventListener('touchstart', onStart, { passive: true });

function onStart(e) {
  dragging = true;
  didDrag = false;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
  startTranslate = translate;
  carousel.classList.add('dragging');
}

window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: false });

function onMove(e) {
  if (!dragging) return;
  var x = e.touches ? e.touches[0].clientX : e.clientX;
  var diff = x - startX;
  if (Math.abs(diff) > 6) {
    didDrag = true;
    if (e.cancelable) e.preventDefault();
  }
  translate = startTranslate + diff;
  carousel.style.transform = 'translateX(' + translate + 'px)';
}

window.addEventListener('mouseup', onEnd);
window.addEventListener('touchend', onEnd);

function onEnd(e) {
  if (!dragging) return;
  dragging = false;
  carousel.classList.remove('dragging');
  var endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  var diff = endX - startX;
  if (didDrag && Math.abs(diff) > 40) {
    goTo(diff < 0 ? current + 1 : current - 1);
    return;
  }
  if (!didDrag) {
    var touch = e.changedTouches ? e.changedTouches[0] : e;
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var card = el && el.closest('.book-card');
    if (card) {
      var idx = parseInt(card.dataset.index, 10);
      if (idx === current) {
        var urls = {
          'Black Book':  'https://black-book-lkkx.glide.page/dl/ced490/r/TOzQVZxsuPIRC9AZJXlq',
          'Red Book':    'https://black-book-lkkx.glide.page/dl/ced490/r/upsdaNYCKCuAyYHX8Cl6',
          'The Wall':    'https://black-book-lkkx.glide.page/dl/ced490/r/FRKRAQGZBzoaK6Ecqwyx',
          'Vocabulary':  'https://black-book-lkkx.glide.page/dl/ced490/r/cnyvzRHVMusKmtt86AIY'
        };
        var url = urls[card.dataset.book];
        if (url) {
          try { window.parent.postMessage({ type: 'bb-navigate', url: url }, '*'); } catch(err) {}
          setTimeout(function() { window.top.location.href = url; }, 30);
        }
      } else {
        goTo(idx);
      }
    }
  } else {
    goTo(current);
  }
}

dots.forEach(function(d, i) { d.addEventListener('click', function() { goTo(i); }); });

document.querySelectorAll('.lang-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    if (btn.dataset.lang === 'ru-en') {
      document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    }
  });
});

window.addEventListener('resize', function() { goTo(current, false); });
goTo(0, false);
</script>
</body>
</html>
