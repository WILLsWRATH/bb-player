<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Black Book</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #0D0D0D;
  font-family: 'Cormorant Garamond', Georgia, serif;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}

/* Header, shelf, book cards, and all your beautiful styling from bookshelf_004.html */
.app-header { /* keep all your header styles */ }
.shelf-section { /* keep */ }
.book-card {
  flex: 0 0 180px;
  height: 256px;
  position: relative;
  transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.45s ease, filter 0.45s ease;
  overflow: visible;
  cursor: pointer;
  transform-origin: bottom center;
  pointer-events: auto !important;
  touch-action: manipulation;
}

.book-card.active {
  transform: scale(1.07) translateY(-6px);
  filter: none;
}

.book-card:not(.active) {
  transform: scale(0.87) translateY(12px);
  filter: brightness(0.45) saturate(0.7);
}

/* Keep all your cover-bb, cover-rb, cover-tw, cover-vc styles exactly as they are in bookshelf_004.html */
/* ... (all the .cover-bb, .inner-border, .book-main-title, .red-rule, etc.) ... */

</style>
</head>
<body>

<!-- Keep your entire HTML structure from bookshelf_004.html exactly as is -->
<div class="app-header"> ... </div>

<div class="shelf-section">
  <div class="shelf-label">Choose Your Book</div>

  <div class="carousel-wrap">
    <div class="carousel" id="carousel">
      <!-- Your 4 book cards stay exactly the same -->
    </div>
  </div>

  <div class="shelf-base"></div>
  <div class="shelf-shadow"></div>

  <div class="book-info">
    <div class="active-title" id="activeTitle">Black Book</div>
    <div class="active-subtitle" id="activeSubtitle">romantic &amp; sweet</div>
    <div class="dots" id="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
  <div class="tap-hint">tap to enter</div>
</div>

<script>
var carousel = document.getElementById('carousel');
var cards = Array.from(carousel.querySelectorAll('.book-card'));
var dotsEl = Array.from(document.getElementById('dots').querySelectorAll('.dot'));
var activeTitle = document.getElementById('activeTitle');
var activeSub = document.getElementById('activeSubtitle');

var CARD_WIDTH = 180;
var GAP = 20;
var STEP = CARD_WIDTH + GAP;
var current = 0;
var startX = 0;
var startTranslate = 0;
var dragging = false;
var didDrag = false;
var translate = 0;
var tapStartTime = 0;
var tapStartX = 0;
var tapStartY = 0;

function getOffset() {
  return (window.innerWidth / 2) - (CARD_WIDTH / 2);
}

function goTo(index) {
  index = Math.max(0, Math.min(cards.length - 1, index));
  current = index;
  translate = -(index * STEP) + getOffset();
  carousel.style.transform = 'translateX(' + translate + 'px)';
  updateActive();
}

function updateActive() {
  cards.forEach(function(c, i) { c.classList.toggle('active', i === current); });
  dotsEl.forEach(function(d, i) { d.classList.toggle('active', i === current); });
  activeTitle.textContent = cards[current].dataset.book;
  activeSub.innerHTML = cards[current].dataset.desc;
}

var urls = {
  'Black Book':  'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/TOzQVZxsuPIRC9AZJXlq',
  'Red Book':    'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/upsdaNYCKCuAyYHX8Cl6',
  'The Wall':    'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/FRKRAQGZBzoaK6Ecqwyx',
  'Vocabulary':  'https://black-book-lkkx.glide.page/dl/ced490/s/b219a3/r/cnyvzRHVMusKmtt86AIY'
};

function navigateTo(bookName) {
  var url = urls[bookName];
  if (!url) return;
  try {
    window.parent.postMessage({ type: 'bb-navigate', url: url }, '*');
  } catch(e) {}
  setTimeout(function() {
    window.top.location.href = url;
  }, 60);
}

carousel.addEventListener('mousedown', onStart);
carousel.addEventListener('touchstart', onStart, { passive: true });

function onStart(e) {
  dragging = true;
  didDrag = false;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
  tapStartX = startX;
  tapStartY = e.touches ? e.touches[0].clientY : e.clientY;
  tapStartTime = Date.now();
  startTranslate = translate;
  carousel.classList.add('dragging');
}

window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: false });

function onMove(e) {
  if (!dragging) return;
  var x = e.touches ? e.touches[0].clientX : e.clientX;
  var diff = x - startX;
  if (Math.abs(diff) > 8) didDrag = true;
  translate = startTranslate + diff;
  carousel.style.transform = 'translateX(' + translate + 'px)';
}

window.addEventListener('mouseup', onEnd);
window.addEventListener('touchend', onEnd);

function onEnd(e) {
  if (!dragging) return;
  dragging = false;
  carousel.classList.remove('dragging');

  var endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  var totalDx = endX - tapStartX;
  var tapDuration = Date.now() - tapStartTime;

  if (didDrag && Math.abs(totalDx) > 35) {
    goTo(totalDx < 0 ? current + 1 : current - 1);
    return;
  }

  if (tapDuration < 400 && Math.abs(totalDx) < 15) {
    var hitX = tapStartX;
    var hitY = tapStartY;
    var el = document.elementFromPoint(hitX, hitY);
    var card = el && el.closest('.book-card');

    if (card) {
      var idx = parseInt(card.dataset.index, 10);
      if (idx === current) {
        navigateTo(card.dataset.book);
      } else {
        goTo(idx);
      }
      return;
    }
  }

  goTo(current);
}

dotsEl.forEach(function(d, i) {
  d.addEventListener('click', function() { goTo(i); });
});

window.addEventListener('resize', function() { goTo(current); });
goTo(0);
</script>
</body>
</html>
